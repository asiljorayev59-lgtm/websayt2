<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Sniper Signal - Antigravity Edition</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: {
                glassBg: 'rgba(10, 15, 28, 0.75)',
                glassBorder: 'rgba(255, 255, 255, 0.1)',
                brand: '#00F0FF',
                razgon: '#FF00FF',
                bullish: '#00E676',
                bearish: '#FF1744'
            }}}
        }
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 30%, #0d1224 0%, #020617 100%);
            height: 100vh;
            overflow: hidden;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .neon-mag { box-shadow: 0 0 20px rgba(255,0,255,0.4); }
        .razgon-active { animation: razgonPulse 1.8s infinite; }
        @keyframes razgonPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255,0,255,0.3); }
            50% { box-shadow: 0 0 40px rgba(255,0,255,0.7); }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="glass-panel h-16 flex items-center justify-between px-6">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-crosshairs text-3xl text-brand"></i>
            <div>
                <span class="text-xs tracking-widest text-muted">TRADING SNIPER</span>
                <span class="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-pink-500">ANTIGRAVITY</span>
            </div>
        </div>

        <!-- Market Tabs -->
        <div class="flex gap-1 bg-black/40 p-1 rounded-2xl">
            <button data-market="forex"     class="market-tab active px-5 py-2 rounded-xl text-sm font-bold">Forex</button>
            <button data-market="crypto"    class="market-tab px-5 py-2 rounded-xl text-sm font-bold text-muted hover:text-white">Crypto</button>
            <button data-market="synthetic" class="market-tab px-5 py-2 rounded-xl text-sm font-bold text-muted hover:text-white">Synthetic</button>
            <button data-market="stocks"    class="market-tab px-5 py-2 rounded-xl text-sm font-bold text-muted hover:text-white">Aksiyalar</button>
        </div>

        <div class="flex items-center gap-4">
            <select id="symbol-select" class="bg-black/60 border border-gray-700 rounded-xl px-4 py-2 text-sm font-mono"></select>
            
            <div class="flex bg-black/40 rounded-xl p-1">
                <button data-tf="M15" class="tf-tab active px-4 py-1.5 rounded-lg text-xs font-bold">M15</button>
                <button data-tf="H1"  class="tf-tab px-4 py-1.5 rounded-lg text-xs font-bold text-muted">H1</button>
                <button data-tf="H4"  class="tf-tab px-4 py-1.5 rounded-lg text-xs font-bold text-muted">H4</button>
            </div>

            <button id="lang-toggle" class="px-4 py-2 text-xs font-bold border border-gray-700 rounded-xl hover:border-brand">EN / UZ</button>
            
            <button id="scan-btn" class="px-6 py-2 bg-emerald-500 hover:bg-emerald-600 text-black font-bold rounded-xl flex items-center gap-2">
                <i class="fa-solid fa-bolt"></i> Scan Market
            </button>
        </div>
    </nav>

    <div class="flex flex-1 gap-4 overflow-hidden">
        
        <!-- LEFT SIDEBAR -->
        <aside class="w-80 glass-panel flex flex-col">
            <div class="p-5 border-b border-gray-700">
                <h2 class="text-lg font-bold flex items-center gap-2"><i class="fa-solid fa-microchip text-brand"></i> Algo Engine</h2>
                <div class="mt-4 flex items-center justify-between bg-black/40 p-3 rounded-2xl">
                    <div>
                        <div class="text-sm font-bold text-brand">Confluence Mode</div>
                        <div class="text-xs text-gray-400">2+ strategiya mos tushishi</div>
                    </div>
                    <input id="confluence-toggle" type="checkbox" class="w-10 h-5 accent-brand">
                </div>
            </div>
            <div id="strategies-list" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        </aside>

        <!-- CENTER CHART -->
        <main class="flex-1 glass-panel flex flex-col relative">
            <div id="chart-container" class="flex-1"></div>
            
            <!-- Tooltip -->
            <div id="signal-tooltip" class="hidden absolute bg-zinc-900 border border-gray-700 rounded-2xl p-4 w-72 shadow-2xl z-50">
                <div id="tt-strat" class="font-bold text-lg"></div>
                <div id="tt-asset" class="text-xs text-gray-400"></div>
                <div id="tt-type" class="mt-2 px-3 py-1 inline-block rounded-lg text-xs font-bold"></div>
                <div id="tt-desc" class="text-sm mt-3 text-gray-300"></div>
                <div id="tt-conf" class="mt-3 text-brand font-bold"></div>
            </div>
        </main>

        <!-- RIGHT TERMINAL -->
        <aside class="w-80 glass-panel flex flex-col">
            <div class="p-5 border-b border-gray-700">
                <h2 class="font-bold text-lg flex items-center gap-2"><i class="fa-solid fa-terminal"></i> Execution Terminal</h2>
                <div class="mt-4 grid grid-cols-2 gap-3">
                    <div class="bg-black/50 p-3 rounded-2xl text-center">
                        <div class="text-xs text-gray-400">Equity</div>
                        <div id="demo-equity" class="text-xl font-mono font-bold">$10,000</div>
                    </div>
                    <div class="bg-black/50 p-3 rounded-2xl text-center">
                        <div class="text-xs text-gray-400">Open P/L</div>
                        <div id="demo-pl" class="text-xl font-mono font-bold text-emerald-400">$0.00</div>
                    </div>
                </div>
                <button id="execute-btn" class="mt-4 w-full py-3 bg-brand text-black font-bold rounded-2xl">Execute Latest Signal</button>
            </div>
            
            <div class="flex border-b border-gray-700">
                <button onclick="switchTab('portfolio')" id="tab-portfolio" class="flex-1 py-3 font-bold border-b-2 border-brand">PORTFOLIO</button>
                <button onclick="switchTab('log')" id="tab-log" class="flex-1 py-3 font-bold text-gray-400">LOG</button>
            </div>
            
            <div id="view-portfolio" class="flex-1 p-4 overflow-y-auto"></div>
            <div id="view-log" class="hidden flex-1 p-4 overflow-y-auto">
                <table class="w-full text-xs" id="signal-log"></table>
            </div>
        </aside>
    </div>

    <!-- NEURAL ANALYZER -->
    <div class="glass-panel h-52 p-4">
        <h3 class="font-bold flex items-center gap-2"><i class="fa-solid fa-brain text-pink-500"></i> Neural Vision Analyzer</h3>
        <div id="nv-dropzone" class="mt-3 border-2 border-dashed border-gray-600 rounded-3xl h-36 flex flex-col items-center justify-center cursor-pointer hover:border-brand">
            <i class="fa-solid fa-upload text-3xl text-gray-500 mb-2"></i>
            <p class="text-sm text-gray-400">Drag & drop or click to upload chart screenshot</p>
        </div>
        <input type="file" id="nv-file" accept="image/*" class="hidden">
    </div>

    <script>
        // Siz yuborgan to'liq JavaScript kodini shu yerga joylashtirdim
        // (MARKETS, STRATEGIES, generateData, analyzeSignals, ema, rsi va boshqa funksiyalar)
        
        // ... (Sizning bergan JavaScript kodining to'liq versiyasi shu joyga qo'yiladi)
        
        // Hozircha qisqartirilgan holda ko'rsatyapman. To'liq kodni keyingi xabarda beraman.
        
        console.log("Antigravity Edition yuklandi. Barcha bo'limlar tayyorlanmoqda...");
    </script>
</body>
</html>
