<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Sniper Signal - Antigravity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #020617;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Navbar -->
    <nav class="glass h-14 flex items-center px-6 border-b border-gray-700">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-crosshairs text-2xl text-cyan-400"></i>
            <span class="text-xl font-bold tracking-wider">ANTIGRAVITY</span>
        </div>
        <div class="ml-auto flex gap-6 text-sm">
            <button onclick="changeMarket('forex')" class="hover:text-cyan-400">Forex</button>
            <button onclick="changeMarket('crypto')" class="hover:text-cyan-400">Crypto</button>
            <button onclick="changeMarket('synthetic')" class="hover:text-cyan-400">Synthetic</button>
            <button onclick="changeMarket('stocks')" class="hover:text-cyan-400">Aksiyalar</button>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <!-- Left Sidebar -->
        <div class="w-72 glass border-r border-gray-700 p-4 overflow-y-auto">
            <h2 class="font-bold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-microchip"></i> Strategiyalar
            </h2>
            <div id="strategies" class="space-y-3 text-sm"></div>
        </div>

        <!-- Main Chart -->
        <div class="flex-1 flex flex-col">
            <div id="chart" class="flex-1"></div>
        </div>

        <!-- Right Panel -->
        <div class="w-80 glass border-l border-gray-700 p-4 flex flex-col">
            <h2 class="font-bold mb-4">Demo Hisob</h2>
            <div class="space-y-4">
                <div>
                    <div class="text-xs text-gray-400">Balans</div>
                    <div id="balance" class="text-3xl font-mono font-bold">$10,000</div>
                </div>
                <button onclick="executeTrade()" 
                        class="w-full py-3 bg-cyan-500 hover:bg-cyan-600 text-black font-bold rounded-xl">
                    Signalni Ijro Etish
                </button>
            </div>
            
            <div class="mt-auto pt-6">
                <h3 class="text-sm font-bold mb-2">Neural Analyzer</h3>
                <div id="dropzone" 
                     class="border-2 border-dashed border-gray-600 rounded-2xl h-32 flex items-center justify-center text-center text-sm cursor-pointer hover:border-cyan-400">
                    Skrinshotni shu yerga tashlang
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple demo - keyingi bosqichlarda to'liq kod qo'shiladi
        console.log("✅ Antigravity Edition yuklandi (Railway versiyasi)");

        // Tailwind scriptni ishga tushirish uchun
        document.documentElement.classList.add('dark');

        // Temporary chart
        let chart;
        function initChart() {
            const container = document.getElementById('chart');
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 500,
                layout: { background: { color: '#020617' }, textColor: '#64748b' }
            });
            const series = chart.addCandlestickSeries();
            series.setData([
                { time: '2024-01-01', open: 100, high: 105, low: 98, close: 102 },
                { time: '2024-01-02', open: 102, high: 108, low: 101, close: 106 }
            ]);
        }

        window.onload = () => {
            initChart();
            document.getElementById('strategies').innerHTML = `
                <div class="p-3 bg-black/30 rounded-xl">ICT Order Block</div>
                <div class="p-3 bg-black/30 rounded-xl">Razgon Strategy</div>
                <div class="p-3 bg-black/30 rounded-xl">EMA Cross</div>
            `;
        };

        function changeMarket(market) {
            alert(market + " bozori tanlandi (keyingi bosqichda to'liq ishlaydi)");
        }

        function executeTrade() {
            alert("✅ Signal ijro etildi! Demo hisob yangilandi.");
        }
    </script>
</body>
</html>
