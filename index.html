<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Sniper Signal - Antigravity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #020617;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        .glass {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
        }
    </style>
</head>
<body class="flex flex-col">

    <nav class="glass h-16 flex items-center px-8 border-b border-gray-700">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-crosshairs text-3xl text-cyan-400"></i>
            <span class="text-2xl font-bold tracking-wider text-white">ANTIGRAVITY</span>
        </div>
        <div class="ml-auto text-sm font-medium flex gap-8">
            <a href="#" class="hover:text-cyan-400">Forex</a>
            <a href="#" class="hover:text-cyan-400">Crypto</a>
            <a href="#" class="hover:text-cyan-400">Synthetic</a>
            <a href="#" class="hover:text-cyan-400">Aksiyalar</a>
        </div>
    </nav>

    <div class="flex flex-1 p-4 gap-4 overflow-hidden">
        <!-- Chart -->
        <div class="flex-1 glass rounded-3xl p-4">
            <div id="chart" class="w-full h-full rounded-2xl"></div>
        </div>

        <!-- Right Panel -->
        <div class="w-96 glass rounded-3xl p-6 flex flex-col">
            <h2 class="text-xl font-bold mb-6">Demo Hisob</h2>
            <div class="text-4xl font-mono font-bold mb-8" id="balance">$10,000.00</div>
            
            <button onclick="executeSignal()" 
                    class="w-full py-4 bg-cyan-500 hover:bg-cyan-600 text-black font-bold text-lg rounded-2xl transition">
                Signalni Ijro Etish
            </button>

            <div class="mt-auto pt-8">
                <p class="text-xs text-gray-400 text-center">Railway versiyasi yuklandi</p>
            </div>
        </div>
    </div>

    <script>
        let chart;
        function initChart() {
            const container = document.getElementById('chart');
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: container.clientHeight,
                layout: { background: { color: '#0a1325' }, textColor: '#64748b' },
                grid: { vertLines: { color: '#1e2937' }, horzLines: { color: '#1e2937' } }
            });
            const series = chart.addCandlestickSeries();
            series.setData([
                { time: '2025-04-01', open: 2340, high: 2360, low: 2330, close: 2355 },
                { time: '2025-04-02', open: 2355, high: 2380, low: 2345, close: 2372 },
                { time: '2025-04-03', open: 2372, high: 2390, low: 2360, close: 2378 }
            ]);
        }

        function executeSignal() {
            alert("✅ Signal ijro etildi!\nDemo hisob yangilandi.");
            const balanceEl = document.getElementById('balance');
            balanceEl.textContent = "$10,450.00";
            balanceEl.style.color = "#00E676";
        }

        window.onload = () => {
            initChart();
            console.log("✅ Trading Sniper Signal Antigravity - Railway versiyasi ishga tushdi");
        };
    </script>
</body>
</html>
