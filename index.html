<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Sniper Signal - Antigravity Edition</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        glassBg: 'rgba(15, 23, 42, 0.85)',
                        glassBorder: 'rgba(255, 255, 255, 0.12)',
                        brand: '#00F0FF',
                        razgon: '#FF00FF',
                        bullish: '#00E676',
                        bearish: '#FF1744',
                        muted: '#94A3B8'
                    }
                }
            }
        }
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 20%, #0a1325 0%, #020617 100%);
            height: 100vh;
            overflow: hidden;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .razgon-glow {
            animation: razgonPulse 2s infinite alternate;
        }
        @keyframes razgonPulse {
            from { box-shadow: 0 0 15px rgba(255,0,255,0.4); }
            to   { box-shadow: 0 0 35px rgba(255,0,255,0.8); }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="glass-panel h-16 flex items-center justify-between px-6 text-white">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-crosshairs text-3xl text-brand"></i>
            <div class="leading-none">
                <span class="text-xs tracking-[2px] text-muted">TRADING SNIPER SIGNAL</span>
                <span class="text-2xl font-black bg-gradient-to-r from-brand to-razgon bg-clip-text text-transparent">ANTIGRAVITY</span>
            </div>
        </div>

        <!-- Market Tabs -->
        <div class="flex bg-black/50 p-1 rounded-2xl border border-glassBorder">
            <button data-market="forex" class="market-tab active px-6 py-2 rounded-xl text-sm font-semibold">Forex</button>
            <button data-market="crypto" class="market-tab px-6 py-2 rounded-xl text-sm font-semibold text-muted">Crypto</button>
            <button data-market="synthetic" class="market-tab px-6 py-2 rounded-xl text-sm font-semibold text-muted">Synthetic</button>
            <button data-market="stocks" class="market-tab px-6 py-2 rounded-xl text-sm font-semibold text-muted">Aksiyalar</button>
        </div>

        <div class="flex items-center gap-4">
            <select id="symbol-select" class="bg-black/70 border border-glassBorder rounded-xl px-4 py-2 text-sm font-mono"></select>
            
            <div class="flex bg-black/50 rounded-2xl p-1 border border-glassBorder">
                <button data-tf="M15" class="tf-tab active px-4 py-1.5 rounded-xl text-xs font-bold">M15</button>
                <button data-tf="H1" class="tf-tab px-4 py-1.5 rounded-xl text-xs font-bold text-muted">H1</button>
                <button data-tf="H4" class="tf-tab px-4 py-1.5 rounded-xl text-xs font-bold text-muted">H4</button>
            </div>

            <button id="lang-toggle" class="px-4 py-2 text-sm font-bold border border-glassBorder rounded-xl hover:border-brand transition-colors">EN / UZ</button>
            
            <button id="scan-btn" class="px-6 py-2.5 bg-emerald-500 hover:bg-emerald-600 text-black font-bold rounded-2xl flex items-center gap-2 transition-all">
                <i class="fa-solid fa-bolt"></i> 
                <span>Scan Market</span>
            </button>
        </div>
    </nav>

    <div class="flex flex-1 gap-4 overflow-hidden">
        
        <!-- LEFT SIDEBAR - STRATEGIES -->
        <aside class="w-80 glass-panel flex flex-col overflow-hidden">
            <div class="p-5 border-b border-glassBorder">
                <h2 class="text-lg font-bold flex items-center gap-2 text-brand">
                    <i class="fa-solid fa-microchip"></i> Algo Engine
                </h2>
            </div>
            <div class="p-4 flex-1 overflow-y-auto space-y-3" id="strategies-list">
                <!-- JS orqali to'ldiriladi -->
            </div>
        </aside>

        <!-- CENTER - BIG CHART -->
        <main class="flex-1 glass-panel flex flex-col relative overflow-hidden">
            <div id="chart-container" class="flex-1 w-full"></div>
        </main>

        <!-- RIGHT TERMINAL -->
        <aside class="w-80 glass-panel flex flex-col">
            <div class="p-5 border-b border-glassBorder">
                <h2 class="font-bold text-lg flex items-center gap-2">
                    <i class="fa-solid fa-terminal text-brand"></i> Terminal
                </h2>
                <div class="mt-4 grid grid-cols-2 gap-3">
                    <div class="bg-black/60 p-4 rounded-2xl text-center">
                        <div class="text-xs text-muted">Equity</div>
                        <div id="demo-equity" class="text-2xl font-mono font-bold text-white">$10,000</div>
                    </div>
                    <div class="bg-black/60 p-4 rounded-2xl text-center">
                        <div class="text-xs text-muted">Open P/L</div>
                        <div id="demo-pl" class="text-2xl font-mono font-bold">$0.00</div>
                    </div>
                </div>
                <button id="execute-btn" class="mt-6 w-full py-3 bg-brand text-black font-bold rounded-2xl text-sm hover:brightness-110 transition">
                    Execute Latest Signal
                </button>
            </div>
            
            <div class="flex border-b border-glassBorder text-sm">
                <button onclick="switchTab(0)" class="flex-1 py-3 font-semibold border-b-2 border-brand tab-btn">Portfolio</button>
                <button onclick="switchTab(1)" class="flex-1 py-3 font-semibold text-muted tab-btn">Log</button>
            </div>
            
            <div id="tab-content-0" class="flex-1 p-4 overflow-y-auto"></div>
            <div id="tab-content-1" class="hidden flex-1 p-4 overflow-y-auto"></div>
        </aside>
    </div>

    <!-- NEURAL ANALYZER -->
    <div class="glass-panel h-52 p-5">
        <h3 class="font-bold text-lg flex items-center gap-2 mb-3">
            <i class="fa-solid fa-brain text-razgon"></i> Neural Vision Analyzer
        </h3>
        <div id="dropzone" class="border-2 border-dashed border-gray-600 rounded-3xl h-36 flex flex-col items-center justify-center cursor-pointer hover:border-brand transition-colors">
            <i class="fa-solid fa-image text-4xl text-gray-500 mb-2"></i>
            <p class="text-sm text-gray-400">Drag & drop yoki click qilib skrinshot yuklang</p>
        </div>
        <input type="file" id="file-input" accept="image/*" class="hidden">
    </div>

    <script>
        // Bu yerga keyingi bosqichda to'liq JavaScript qo'yamiz
        console.log("✅ Antigravity Edition - 1-bosqich yuklandi");
        
        // Temporary message
        document.getElementById('strategies-list').innerHTML = `
            <div class="p-6 text-center text-gray-400">
                <i class="fa-solid fa-spinner fa-spin text-2xl mb-3"></i><br>
                Strategiyalar yuklanmoqda... (2-bosqichda to'liq bo'ladi)
            </div>
        `;
    </script>
</body>
</html>
